<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Иконки банков</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #000000;
–surface: #1c1c1e;
–surface2: #2c2c2e;
–surface3: #3a3a3c;
–separator: rgba(255,255,255,0.08);
–text-primary: #ffffff;
–text-secondary: rgba(255,255,255,0.55);
–accent: #0a84ff;
–green: #34c759;
–radius: 13px;
}

html, body {
background: var(–bg);
color: var(–text-primary);
font-family: -apple-system, ‘Helvetica Neue’, sans-serif;
min-height: 100dvh;
overscroll-behavior: none;
}

.status-bar { height: env(safe-area-inset-top, 44px); }

/* NAV */
.nav {
padding: 8px 20px 16px;
display: flex; flex-direction: column; gap: 2px;
}
.nav-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; color: var(–text-primary); }
.nav-sub   { font-size: 13px; color: var(–text-secondary); }

/* SECTION */
.section { margin: 0 20px 32px; }
.section-header {
font-size: 13px; font-weight: 400; color: var(–text-secondary);
text-transform: uppercase; letter-spacing: 0.5px;
padding: 0 4px; margin-bottom: 8px;
}

/* LIST */
.list { background: var(–surface); border-radius: var(–radius); overflow: hidden; }

.list-item {
display: flex; align-items: center;
padding: 12px 16px; gap: 14px;
position: relative; user-select: none;
}
.list-item + .list-item::before {
content: ‘’; position: absolute; top: 0; left: 58px; right: 0;
height: 0.5px; background: var(–separator);
}

/* BANK ICON */
.bank-icon {
width: 44px; height: 44px; border-radius: 11px;
flex-shrink: 0; overflow: hidden;
background: var(–surface2);
display: flex; align-items: center; justify-content: center;
}
.bank-icon img {
width: 100%; height: 100%; object-fit: cover; display: block;
}
.bank-icon .fallback {
width: 100%; height: 100%;
display: flex; align-items: center; justify-content: center;
font-size: 18px; font-weight: 700; color: white;
background: var(–surface3);
border-radius: 11px;
}

.bank-info { flex: 1; min-width: 0; }
.bank-name {
font-size: 17px; font-weight: 400; color: var(–text-primary);
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bank-folder { font-size: 13px; color: var(–text-secondary); margin-top: 1px; }

/* TOGGLE — proper iOS style */
.toggle {
position: relative;
width: 51px; height: 31px;
flex-shrink: 0; cursor: pointer;
}
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
position: absolute; inset: 0;
background: var(–surface3);
border-radius: 15.5px;
transition: background 0.25s;
}
.toggle input:checked + .toggle-track { background: var(–green); }
.toggle-thumb {
position: absolute;
width: 27px; height: 27px;
background: white; border-radius: 50%;
top: 2px; left: 2px;
transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
box-shadow: 0 2px 6px rgba(0,0,0,0.35);
pointer-events: none;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(20px); }

/* LOADING STATE */
.loading-wrap {
padding: 32px 20px;
text-align: center;
color: var(–text-secondary);
font-size: 15px;
display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.spinner {
width: 28px; height: 28px;
border: 2.5px solid var(–surface3);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-wrap {
margin: 0 20px;
background: var(–surface);
border-radius: var(–radius);
padding: 20px;
text-align: center;
color: #ff453a;
font-size: 15px;
line-height: 1.5;
}

/* GENERATE BTN */
.generate-btn {
display: block; width: 100%; padding: 17px;
background: var(–accent); color: white;
font-size: 17px; font-weight: 600; border: none;
border-radius: var(–radius); cursor: pointer; text-align: center;
transition: opacity 0.15s, transform 0.1s;
letter-spacing: -0.2px; -webkit-appearance: none;
}
.generate-btn:active { opacity: 0.8; transform: scale(0.98); }
.generate-btn:disabled { opacity: 0.4; }

.hint {
text-align: center; font-size: 13px; color: var(–text-secondary);
margin-top: 10px; line-height: 1.4;
}

/* TOAST */
.toast {
position: fixed;
bottom: calc(env(safe-area-inset-bottom, 0px) + 90px);
left: 50%; transform: translateX(-50%) translateY(20px);
background: rgba(50,50,52,0.95);
backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
color: white; padding: 12px 20px; border-radius: 20px;
font-size: 15px; font-weight: 500; white-space: nowrap;
opacity: 0; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.bottom-pad { height: calc(env(safe-area-inset-bottom, 0px) + 20px); }
</style>

</head>
<body>

<div class="status-bar"></div>

<div class="nav">
  <div class="nav-title">Иконки банков</div>
  <div class="nav-sub">Выберите приложения для установки</div>
</div>

<div class="section">
  <div class="section-header">Приложения</div>
  <div id="listWrap">
    <div class="loading-wrap">
      <div class="spinner"></div>
      Загружаем список…
    </div>
  </div>
</div>

<div class="section" id="btnSection" style="display:none">
  <button class="generate-btn" id="genBtn" onclick="generateProfile()" disabled>
    Установить иконки
  </button>
  <div class="hint">Откроется установка профиля iOS.<br>Перейдите в Настройки → Профиль для подтверждения.</div>
</div>

<div class="bottom-pad"></div>
<div class="toast" id="toast"></div>

<script>
const GITHUB_USER = 'cursorus';
const GITHUB_REPO = 'webclipy';
const RAW_BASE    = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;
const API_BASE    = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents`;

// bank metadata — folder name → display name + url
// если папка не найдена здесь — берём название из имени папки (underscore → пробел)
const BANK_META = {
  't_bank':    { name: 'Т‑Банк',      url: 'https://www.tbank.ru' },
  'vtb':       { name: 'ВТБ',         url: 'https://www.vtb.ru' },
  'alfa_bank': { name: 'Альфа‑Банк',  url: 'https://www.alfabank.ru' },
  'sber':      { name: 'Сбербанк',    url: 'https://www.sber.ru' },
  'ozon':      { name: 'Озон Банк',   url: 'https://www.ozon.ru' },
  'yandex':    { name: 'Яндекс Банк', url: 'https://bank.yandex.ru' },
  'raiffeisen':{ name: 'Райффайзен',  url: 'https://www.raiffeisen.ru' },
  'gazprom':   { name: 'Газпромбанк', url: 'https://www.gazprombank.ru' },
};

let banks = []; // { folder, name, url, iconUrl }

async function init() {
  try {
    // 1. get list of folders inside images/
    const res = await fetch(`${API_BASE}/images`);
    if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
    const entries = await res.json();
    const folders = entries.filter(e => e.type === 'dir').map(e => e.name);

    if (!folders.length) {
      showError('Папка images/ пуста или не найдена в репозитории.');
      return;
    }

    // 2. for each folder — find first image file
    const fetches = folders.map(async folder => {
      const r = await fetch(`${API_BASE}/images/${folder}`);
      if (!r.ok) return null;
      const files = await r.json();
      const img = files.find(f => f.type === 'file' && /\.(png|svg|jpg|jpeg|webp)$/i.test(f.name));
      if (!img) return null;
      const meta = BANK_META[folder] || { name: folder.replace(/_/g, ' '), url: '#' };
      return {
        folder,
        name: meta.name,
        url: meta.url,
        iconUrl: `${RAW_BASE}/images/${folder}/${img.name}`,
        iconFile: img.name,
      };
    });

    const results = (await Promise.all(fetches)).filter(Boolean);
    if (!results.length) {
      showError('Не найдено ни одной иконки в папках images/.');
      return;
    }

    banks = results;
    renderList();

  } catch (e) {
    showError('Не удалось загрузить список с GitHub.<br>' + e.message);
  }
}

function renderList() {
  const wrap = document.getElementById('listWrap');
  wrap.innerHTML = '';

  const list = document.createElement('div');
  list.className = 'list';
  list.id = 'bankList';

  banks.forEach(bank => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.folder = bank.folder;

    const toggleId = 'tog_' + bank.folder;

    item.innerHTML = `
      <div class="bank-icon">
        <img src="${bank.iconUrl}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="fallback" style="display:none">${bank.name[0]}</div>
      </div>
      <div class="bank-info">
        <div class="bank-name">${bank.name}</div>
        <div class="bank-folder">images/${bank.folder}/${bank.iconFile}</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="${toggleId}" checked onchange="updateButton()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>`;

    list.appendChild(item);
  });

  wrap.appendChild(list);
  document.getElementById('btnSection').style.display = '';
  updateButton();
}

function showError(msg) {
  document.getElementById('listWrap').innerHTML = `<div class="error-wrap">${msg}</div>`;
}

function updateButton() {
  const n = document.querySelectorAll('#bankList input[type=checkbox]:checked').length;
  const btn = document.getElementById('genBtn');
  btn.disabled = n === 0;
  btn.textContent = n > 0 ? `Установить иконки (${n})` : 'Выберите хотя бы одну';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

async function fetchIconBase64(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const blob = await res.blob();
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

async function generateProfile() {
  const btn = document.getElementById('genBtn');
  btn.disabled = true; btn.textContent = 'Генерация…';

  const selected = banks.filter(b => {
    const cb = document.getElementById('tog_' + b.folder);
    return cb && cb.checked;
  });

  const clips = [];

  for (const bank of selected) {
    const b64 = await fetchIconBase64(bank.iconUrl);
    const label = bank.folder.replace(/_/g, ' ');

    clips.push(`
    <dict>
      <key>PayloadType</key><string>com.apple.webClip.managed</string>
      <key>PayloadIdentifier</key><string>ru.banks.icons.${label.replace(/ /g,'.')}</string>
      <key>PayloadUUID</key><string>${crypto.randomUUID()}</string>
      <key>PayloadVersion</key><integer>1</integer>
      <key>Label</key><string>${bank.name}</string>
      <key>URL</key><string>${bank.url}</string>
      <key>IsRemovable</key><false/>
      <key>FullScreen</key><true/>${b64 ? `\n      <key>Icon</key><data>${b64}</data>` : ''}
    </dict>`);
  }

  const plist = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
  <key>PayloadDisplayName</key><string>Иконки банков</string>
  <key>PayloadDescription</key><string>Добавляет иконки банков на домашний экран</string>
  <key>PayloadIdentifier</key><string>ru.banks.icons.profile</string>
  <key>PayloadUUID</key><string>${crypto.randomUUID()}</string>
  <key>PayloadType</key><string>Configuration</string>
  <key>PayloadVersion</key><integer>1</integer>
  <key>PayloadContent</key><array>${clips.join('')}
  </array>
</dict></plist>`;

  const blob = new Blob([plist], { type: 'application/x-apple-aspen-config' });
  const blobUrl = URL.createObjectURL(blob);
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  if (isIOS) {
    window.location.href = blobUrl;
    showToast('Открываем установку профиля…');
  } else {
    const a = document.createElement('a');
    a.href = blobUrl; a.download = 'banks.mobileconfig'; a.click();
    showToast('Профиль скачан — установите на iPhone');
  }

  setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
  updateButton();
}

init();
</script>

</body>
</html>
