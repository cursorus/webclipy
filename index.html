<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #000;
  --surface: #1c1c1e;
  --surface2: #2c2c2e;
  --surface3: #3a3a3c;

  --green: #34c759;
  --red: #ff453a;
  --radius: 13px;
}
html, body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, 'Helvetica Neue', sans-serif; min-height: 100dvh; overscroll-behavior: none; }
.status-bar { height: env(safe-area-inset-top, 44px); }
.nav { padding: 8px 20px 16px; display: flex; flex-direction: column; gap: 2px; }
.nav-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; }
.nav-sub { font-size: 13px; color: var(--text-secondary); }
.section { margin: 0 20px 32px; }
.section-header { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px; margin-bottom: 8px; }
.list { background: var(--surface); border-radius: var(--radius); overflow: hidden; }
.list-item { display: flex; align-items: center; padding: 12px 16px; gap: 14px; position: relative; user-select: none; }
.list-item + .list-item::before { content: ''; position: absolute; top: 0; left: 58px; right: 0; height: 0.5px; background: var(--separator); }
.bank-icon { width: 44px; height: 44px; border-radius: 11px; flex-shrink: 0; overflow: hidden; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
.bank-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bank-icon .fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; background: var(--surface3); }
.bank-info { flex: 1; min-width: 0; }
.bank-name { font-size: 17px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bank-count { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }

/* action icons instead of toggles */
.row-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.action-btn { width: 32px; height: 32px; background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 8px; transition: background 0.15s; padding: 0; }
.action-btn:active { background: var(–surface3); }
.action-btn svg { width: 22px; height: 22px; }
.action-btn.install svg { stroke: var(–accent); }
.action-btn.download svg { stroke: var(–green); }

.loading-wrap { padding: 32px 20px; text-align: center; color: var(–text-secondary); font-size: 15px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(–surface3); border-top-color: var(–accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-wrap { background: var(–surface); border-radius: var(–radius); padding: 20px; text-align: center; color: var(–red); font-size: 15px; line-height: 1.5; }

/* scraper section */
.scraper-box { background: var(–surface); border-radius: var(–radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.scraper-field { display: flex; align-items: center; background: var(–surface2); border-radius: 10px; padding: 0 14px; height: 44px; gap: 8px; }
.scraper-field input { flex: 1; background: none; border: none; color: var(–text-primary); font-size: 15px; outline: none; font-family: inherit; }
.scraper-field input::placeholder { color: var(–text-secondary); }
.scraper-btns { display: flex; gap: 8px; }
.scraper-btn { flex: 1; height: 44px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; -webkit-appearance: none; transition: opacity 0.15s; }
.scraper-btn:active { opacity: 0.8; }
.scraper-btn.start { background: var(–accent); color: white; }
.scraper-btn.stop { background: var(–surface3); color: var(–text-primary); }
.scraper-btn:disabled { opacity: 0.4; }
.scraper-status { font-size: 13px; color: var(–text-secondary); text-align: center; }

/* scraped grid */
.scraped-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px 8px; margin-top: 4px; }
.scraped-cell { display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
.scraped-img { width: 100%; aspect-ratio: 1; border-radius: 18%; object-fit: cover; background: var(–surface2); display: block; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.scraped-img.selected { border-color: var(–accent); }
.scraped-del { position: absolute; top: -4px; right: -4px; width: 18px; height: 18px; background: var(–red); border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 700; line-height: 1; }
.scraper-download-btn { display: block; width: 100%; height: 44px; background: var(–green); color: white; font-size: 15px; font-weight: 600; border: none; border-radius: 10px; cursor: pointer; -webkit-appearance: none; margin-top: 8px; transition: opacity 0.15s; }

.scraper-download-btn:disabled { opacity: 0.4; }

.toast { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 90px); left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(50,50,52,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); color: white; padding: 12px 20px; border-radius: 20px; font-size: 15px; font-weight: 500; white-space: nowrap; opacity: 0; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.bottom-pad { height: calc(env(safe-area-inset-bottom, 0px) + 20px); }
</style>

function init() {
  dbg('Загружаем список...');
  fetch(API_BASE + '/images')
    .then(function(res) {
      if (!res.ok) throw new Error('GitHub API: ' + res.status);
      return res.json();
    })
    .then(function(entries) {
      var dirs = entries.filter(function(e) { return e.type === 'dir'; });
      if (!dirs.length) { showError('Папка images/ пуста.'); return; }
      var promises = dirs.map(function(dir) {
        return fetch(API_BASE + '/images/' + dir.name)
          .then(function(r) { if (!r.ok) return null; return r.json(); })
          .then(function(files) {
            if (!files) return null;
            var imgFiles = files.filter(function(f) {
              return f.type === 'file' && /\.(png|svg|jpg|jpeg|webp)$/i.test(f.name);
            }).map(function(f) {
              return { name: f.name, url: RAW_BASE + '/images/' + dir.name + '/' + f.name };

      return Promise.all(promises);

    .then(function(results) {

      renderList();
    })
    .catch(function(e) { showError('Ошибка: ' + e.message); });
}

function urlToPng1024(url) {
  return new Promise(function(resolve) {
    var SIZE = 1024;
    var canvas = document.createElement('canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    var ctx = canvas.getContext('2d');
    if (/\.svg$/i.test(url.split('?')[0])) {
      fetch(url)
        .then(function(res) { return res.text(); })
        .then(function(text) {
          var dataUri = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(text);
          var img = new Image();
          img.onload = function() {
            ctx.drawImage(img, 0, 0, SIZE, SIZE);
            resolve(canvas.toDataURL('image/png').split(',')[1]);
          };
          img.onerror = function() { resolve(null); };
          img.src = dataUri;
        })
        .catch(function() { resolve(null); });
    } else {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        ctx.drawImage(img, 0, 0, SIZE, SIZE);
        resolve(canvas.toDataURL('image/png').split(',')[1]);
      };
      img.onerror = function() { resolve(null); };
      img.src = url;
    }
  });
}

// Получить цвет нижнего центрального пикселя из base64 PNG
function getBottomCenterColor(b64) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      var d = c.getContext('2d').getImageData(Math.floor(img.width / 2), img.height - 1, 1, 1).data;
      resolve('rgb(' + d[0] + ',' + d[1] + ',' + d[2] + ')');
    };
    img.onerror = function() { resolve('#000'); };
    img.src = 'data:image/png;base64,' + b64;
  });
}

function buildPlist(clips) {
return ‘<?xml version="1.0" encoding="UTF-8"?>’ +
‘<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">’ +

‘<key>PayloadDisplayName</key><string>Иконки банков</string>’ +
‘<key>PayloadDescription</key><string>Добавляет иконки на домашний экран</string>’ +
‘<key>PayloadIdentifier</key><string>ru.banks.icons.profile</string>’ +
‘<key>PayloadUUID</key><string>’ + crypto.randomUUID() + ‘</string>’ +
‘<key>PayloadType</key><string>Configuration</string>’ +
‘<key>PayloadVersion</key><integer>1</integer>’ +
‘<key>PayloadContent</key><array>’ + clips.join(’’) + ‘</array>’ +
‘</dict></plist>’;
}

function triggerDownload(plist, filename) {
var blob = new Blob([plist], { type: ‘application/x-apple-aspen-config’ });
var blobUrl = URL.createObjectURL(blob);
var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
if (isIOS) {
window.location.href = blobUrl;
showToast(‘Открываем установку профиля…’);
} else {
var a = document.createElement(‘a’);
a.href = blobUrl; a.download = filename || ‘banks.mobileconfig’; a.click();
showToast(‘Профиль скачан’);
}
setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 5000);
}

// Установить одну папку
async function installFolder(idx) {
var folder = folders[idx];
var btn = document.querySelector(’[data-idx=”’ + idx + ‘”] .action-btn.install’);
if (btn) { btn.style.opacity = ‘0.4’; btn.disabled = true; }
showToast(‘Генерация…’);
var clips = await processFolder(folder);
var plist = buildPlist(clips);
triggerDownload(plist, folder.folder + ‘.mobileconfig’);
if (btn) { btn.style.opacity = ‘’; btn.disabled = false; }
}

showToast(’Скачиваем ’ + folder.name + ‘…’);

// качаем JSZip если нет

await new Promise(function(resolve, reject) {

s.src = ‘https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js’;

function addScrapedImage(objUrl, origUrl) {
scraperImages.push({ objUrl: objUrl, origUrl: origUrl, selected: true });
var idx = scraperImages.length - 1;
var grid = document.getElementById(‘scrapedGrid’);

var cell = document.createElement(‘div’);
cell.className = ‘scraped-cell’;
cell.setAttribute(‘data-sidx’, idx);

var img = document.createElement(‘img’);
img.className = ‘scraped-img selected’;
img.src = objUrl;
img.onclick = function() {
scraperImages[idx].selected = !scraperImages[idx].selected;
img.classList.toggle(‘selected’, scraperImages[idx].selected);
updateScraperDownload();
};

var del = document.createElement(‘button’);
del.className = ‘scraped-del’;
del.textContent = ‘x’;
del.onclick = function() {
scraperImages[idx].selected = false;
scraperImages[idx].deleted = true;
cell.style.display = ‘none’;
updateScraperDownload();
};

cell.appendChild(img);
cell.appendChild(del);
grid.appendChild(cell);
updateScraperDownload();
}

function updateScraperDownload() {
var n = scraperImages.filter(function(i) { return i.selected && !i.deleted; }).length;
var btn = document.getElementById(‘scraperDownload’);
btn.style.display = scraperImages.length > 0 ? ‘block’ : ‘none’;
btn.disabled = n === 0;
btn.textContent = n > 0 ? ‘Скачать выбранные (’ + n + ‘)’ : ‘Выберите иконки’;
}

async function downloadScraped() {
var selected = scraperImages.filter(function(i) { return i.selected && !i.deleted; });
if (!selected.length) return;

if (!window.JSZip) {
await new Promise(function(resolve, reject) {
var s = document.createElement(‘script’);
s.src = ‘https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js’;
s.onload = resolve; s.onerror = reject;
document.head.appendChild(s);
});
}

var zip = new JSZip();
for (var i = 0; i < selected.length; i++) {
var item = selected[i];
try {
var res = await fetch(item.objUrl);
var blob = await res.blob();
var ext = (blob.type.split(’/’)[1] || ‘png’).replace(‘jpeg’,‘jpg’);
zip.file(‘icon_’ + (i + 1) + ‘.’ + ext, blob);
} catch(e) {}
}

var content = await zip.generateAsync({ type: ‘blob’ });
var url = URL.createObjectURL(content);
var a = document.createElement(‘a’);
a.href = url; a.download = ‘icons.zip’; a.click();
setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
showToast(‘Скачано ’ + selected.length + ’ иконок’);
}
